global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'clientes-service'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['clientes-service:8081']

  - job_name: 'cuentas-service'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['cuentas-service:8082']

  - job_name: 'gateway-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway-service:8080']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
